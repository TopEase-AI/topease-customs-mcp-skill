interface:
  display_name: "TOPEASE 海关数据 MCP"
  short_description: "通过 MCP 查询全球海关贸易记录"
  default_prompt: "使用 $topease-customs-mcp 查询某个产品、企业、HS 编码或国家的海关贸易记录。"

dependencies:
  tools:
    - type: "mcp"
      value: "topease-customs-data"
      description: "TOPEASE 全球海关进出口贸易记录 streamable HTTP MCP 服务；需要 Tradee/TOPEASE API key。"
      transport: "streamable_http"
      url: "https://mcp.topease.net/mcp"

policy:
  allow_implicit_invocation: true
